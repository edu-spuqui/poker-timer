<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poker Timer • PT-BR</title>
	<link rel="icon" type="image/png" href="icon.png">
	<link rel="shortcut icon" href="icon.png">
    <link rel="stylesheet" href="styles.css?v=1.2">
	<style>
    </style>
</head>
<body id="mainBody">
	
    <div id="topBar">
		<span id="wall-clock">00:00:00</span>
		<div id="next">Próximo nível: -- / --</div>
		<span id="battery-status" style="font-size: 4vh;">
			🔋 <span id="battery-level">--%</span>
		</span>
		<button id="config-btn" onclick="showConfig()">⋮</button>
    </div>

	<div class="control-block">
		<div class="row">
			<button class="adj-btn" onclick="changeLevel(-1)">◀</button>
			<div id="blinds">
				<div id="smallblind"> -- </div>
				<div id="bigblind"> -- </div>
			</div>
			<button class="adj-btn" id="btn-next-level" onclick="changeLevel(1)">▶</button>
		</div>
	</div>

	<div class="control-block">
		<div class="row">
			<button class="adj-btn" onclick="adjustTime(-30)">◀</button>
			<div id="timershadow" class="timershadow">00:00</div>
			<div id="timer" class="timer">12:00</div>
			<button class="adj-btn" onclick="adjustTime(30)">▶</button>
		</div>
	</div>
	
	<button id="playBtn" class="state-btn btn-green" onclick="toggleTimer()">Iniciar Jogo</button>
	
    <audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>

<div id="config-overlay">
    <div class="config-card">
		<div class="config-sidebyside">
			<div class="config-left">
				<div><h2 style="margin:0; color:#00ff00;">Estrutura do Jogo</h2>
					<div style="display:flex;flex-direction:row;gap:1vh;">
						<select id="preset-selector">
							<option value="psop" selected>Pilarzinho Series of Poker</option>
							<option value="new1">Slot Livre 1</option>
							<option value="new2">Slot Livre 2</option>
						</select>
						<button class="btn-outline" title="Carregar" onclick="loadPresetIntoForm()">▶</button>
					</div>
				</div>

				<div><label>Duração do Nível</label><br><input type="number" id="input-level-time" value="12"><span style="font-size:5vh;">min</span></div>
			</div>
			
			<div class="config-right">
				<h2 style="margin:0; color:#00ff00;">Blinds</h2>
				<textarea id="input-blinds" spellcheck="false" autocorrect="off" autocomplete="off"></textarea>
			</div>
		</div>
		<div class="config-actions">
			<button class="btn-secondary" onclick="hideConfig()">Cancelar</button>
			<button class="btn-primary" onclick="saveAndApplyConfig()">Aplicar</button>
		</div>
    </div>
</div>

<script src="scripts.js" type="text/javascript"></script>
</body>
</html>
