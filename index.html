<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poker Timer • PT-BR</title>
	<link rel="icon" type="image/png" href="icon.png">
	<link rel="shortcut icon" href="icon.png">
    <link rel="stylesheet" href="styles.css">
	<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Teko&family=Mono&display=swap" rel="stylesheet">
	<style>
    </style>
</head>
<body id="mainBody">
	
    <div id="topBar">
		<span id="wall-clock">00:00:00</span>
		<button id="config-btn" onclick="showConfig()">⋮</button>
    </div>

	<div class="control-block" style="margin-top:3vh;">
		<div id="next">Próximo nível: -- / --</div>
		<div class="row">
			<button class="adj-btn" onclick="changeLevel(-1)">◀</button>
			<div id="blinds">-- / --</div>
			<button class="adj-btn" onclick="changeLevel(1)">▶</button>
		</div>
	</div>

	<div class="control-block">
		<div class="row">
			<button class="adj-btn" onclick="adjustTime(-60)">◀</button>
			<div id="timer">12:00</div>
			<button class="adj-btn" onclick="adjustTime(60)">▶</button>
		</div>
	</div>
	
	<button id="playBtn" class="state-btn btn-green" onclick="toggleTimer()">Iniciar<br>Jogo</button>
	
    <audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>

<div id="config-overlay">
    <div class="config-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="margin:0; color:#00ff00;">Estrutura do Jogo</h2>
            <button class="btn-outline" onclick="loadPSOPIntoForm()">Usar Padrão PSOP</button>
        </div>
        
        <div style="display:flex; gap:15px; max-width:90vw;">
            <div style="flex:1;">
                <label>Nível (min)</label>
                <input type="number" id="input-level-time" value="12">
            </div>
            <div style="flex:1;">
                <label>Intervalo (min)</label>
                <input type="number" id="input-break-time" value="15">
            </div>
        </div>
        
        <label style="margin-top:20px; display:block;">Sequência de Blinds / Intervalos</label>
        <textarea id="input-blinds"></textarea>

        <div class="config-actions">
            <button class="btn-secondary" onclick="hideConfig()">Cancelar</button>
            <button class="btn-primary" onclick="saveAndApplyConfig()">Aplicar e Salvar</button>
        </div>
    </div>
</div>

<script src="scripts.js" type="text/javascript"></script>
</body>
</html>
